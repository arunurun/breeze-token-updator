name: Validate Breeze token

on:
  workflow_dispatch:
  schedule:
    # 08:45 IST Monday-Friday
    - cron: "15 3 * * 1-5"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate token and notify if expired
        env:
          BREEZE_API_KEY: ${{ secrets.BREEZE_API_KEY }}
          BREEZE_SECRET: ${{ secrets.BREEZE_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TOKEN_UPDATE_URL: ${{ secrets.TOKEN_UPDATE_URL }}
          STATE_SIGNING_SECRET: ${{ secrets.STATE_SIGNING_SECRET }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python src/validate_token.py
